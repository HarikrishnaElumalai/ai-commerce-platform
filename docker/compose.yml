name: odin

services:
  postgres:
    image: postgres:${POSTGRES_VERSION}
    container_name: odin-postgres

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}

    ports:
      - "5432:5432"
    volumes:
      - odin-postgres-data:/var/lib/postgresql/data
    networks:
      - odin-network

  redis:
    image: redis:${REDIS_VERSION}
    container_name: odin-redis

    restart: unless-stopped

    command: redis-server --appendonly yes

    ports:
      - "${REDIS_PORT}:6379"

    volumes:
      - odin-redis-data:/data

    networks:
      - odin-network

networks:
  odin-network:
    driver: bridge

volumes:
  odin-postgres-data:
  odin-redis-data:

